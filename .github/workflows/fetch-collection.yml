name: Fetch BGG Collection

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch BGG collection XML
        env:
          BGG_TOKEN: ${{ secrets.BGG_TOKEN }}
          BGG_USERNAME: eyeamthekiller0
        run: |
          echo "Fetching collection for $BGG_USERNAME..."

          for i in {1..8}; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $BGG_TOKEN" \
              "https://boardgamegeek.com/xmlapi2/collection?username=$BGG_USERNAME&own=1&stats=1")

            echo "Attempt $i - first 300 chars:"
            echo "${RESPONSE:0:300}"

            if echo "$RESPONSE" | grep -q '<message>'; then
              echo "Queued, waiting 15s..."
              sleep 15
            else
              echo "Valid response received."
              break
            fi
          done

          ITEM_COUNT=$(echo "$RESPONSE" | grep -o '<item ' | wc -l)
          echo "Items in response: $ITEM_COUNT"

          if [ "$ITEM_COUNT" -eq 0 ]; then
            echo "ERROR: No items found. Full response:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "$RESPONSE" > raw_collection.xml

      - name: Parse collection XML to JSON
        run: python3 scripts/parse_collection.py

      - name: Fetch game details (categories and mechanics)
        env:
          BGG_TOKEN: ${{ secrets.BGG_TOKEN }}
        run: python3 scripts/fetch_details.py

      - name: Commit collection.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add collection.json
          git diff --staged --quiet || git commit -m "chore: update BGG collection [$(date -u '+%Y-%m-%d')]"
          git push
