name: Fetch BGG Collection

on:
  schedule:
    - cron: '0 4 * * *'  # Runs daily at 4am UTC
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch BGG collection
        env:
          BGG_TOKEN: ${{ secrets.BGG_TOKEN }}
          BGG_USERNAME: eyeamthekiller0
        run: |
          echo "Fetching collection for $BGG_USERNAME..."

          # Fetch owned games collection with stats
          RESPONSE=$(curl -s -f \
            -H "Authorization: Bearer $BGG_TOKEN" \
            "https://boardgamegeek.com/xmlapi2/collection?username=$BGG_USERNAME&own=1&stats=1&excludesubtype=boardgameexpansion")

          # BGG sometimes returns 202 (queued) — retry up to 5 times
          for i in {1..5}; do
            STATUS=$(echo "$RESPONSE" | grep -o '<message>.*</message>' | head -1)
            if [ -z "$STATUS" ]; then
              break
            fi
            echo "BGG returned queued response, retrying in 10s... (attempt $i)"
            sleep 10
            RESPONSE=$(curl -s -f \
              -H "Authorization: Bearer $BGG_TOKEN" \
              "https://boardgamegeek.com/xmlapi2/collection?username=$BGG_USERNAME&own=1&stats=1&excludesubtype=boardgameexpansion")
          done

          echo "$RESPONSE" > raw_collection.xml

          # Parse XML to JSON using Python
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import json

          tree = ET.parse('raw_collection.xml')
          root = tree.getroot()

          games = []
          for item in root.findall('item'):
              game_id = item.get('objectid')

              name_el = item.find('name')
              name = name_el.text if name_el is not None else 'Unknown'

              year_el = item.find('yearpublished')
              year = year_el.text if year_el is not None else ''

              thumb_el = item.find('thumbnail')
              thumbnail = thumb_el.text if thumb_el is not None else ''

              image_el = item.find('image')
              image = image_el.text if image_el is not None else ''

              stats = item.find('stats')
              avg_rating = ''
              num_ratings = ''
              weight = ''
              min_players = ''
              max_players = ''
              min_playtime = ''
              max_playtime = ''

              if stats is not None:
                  min_players = stats.get('minplayers', '')
                  max_players = stats.get('maxplayers', '')
                  min_playtime = stats.get('minplaytime', '')
                  max_playtime = stats.get('maxplaytime', '')
                  rating_el = stats.find('rating')
                  if rating_el is not None:
                      avg_el = rating_el.find('average')
                      if avg_el is not None:
                          avg_rating = avg_el.get('value', '')
                      num_rating_el = rating_el.find('usersrated')
                      if num_rating_el is not None:
                          num_ratings = num_rating_el.get('value', '')
                      weight_el = rating_el.find('averageweight')
                      if weight_el is not None:
                          weight = weight_el.get('value', '')

              user_rating_el = item.find('.//rating')
              user_rating = ''
              if user_rating_el is not None:
                  val = user_rating_el.get('value', '')
                  if val != 'N/A':
                      user_rating = val

              num_plays_el = item.find('numplays')
              num_plays = num_plays_el.text if num_plays_el is not None else '0'

              games.append({
                  'id': game_id,
                  'name': name,
                  'year': year,
                  'thumbnail': thumbnail,
                  'image': image,
                  'avg_rating': avg_rating,
                  'num_ratings': num_ratings,
                  'user_rating': user_rating,
                  'weight': weight,
                  'num_plays': num_plays,
                  'min_players': min_players,
                  'max_players': max_players,
                  'min_playtime': min_playtime,
                  'max_playtime': max_playtime,
              })

          games.sort(key=lambda g: g['name'].lower())

          output = {
              'username': 'eyeamthekiller0',
              'updated': __import__('datetime').datetime.utcnow().isoformat() + 'Z',
              'count': len(games),
              'games': games
          }

          with open('collection.json', 'w') as f:
              json.dump(output, f, indent=2)

          print(f"Saved {len(games)} games to collection.json")
          EOF

      - name: Fetch game details (categories, mechanics) in batches
        env:
          BGG_TOKEN: ${{ secrets.BGG_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, urllib.request, xml.etree.ElementTree as ET, time, os

          with open('collection.json') as f:
              data = json.load(f)

          games = data['games']
          ids = [g['id'] for g in games]
          token = os.environ['BGG_TOKEN']

          # BGG allows up to ~20 IDs per thing request
          def chunks(lst, n):
              for i in range(0, len(lst), n):
                  yield lst[i:i+n]

          details = {}
          for batch in chunks(ids, 20):
              id_str = ','.join(batch)
              url = f'https://boardgamegeek.com/xmlapi2/thing?id={id_str}&type=boardgame'
              req = urllib.request.Request(url, headers={'Authorization': f'Bearer {token}'})
              for attempt in range(4):
                  try:
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          xml_data = resp.read()
                      break
                  except Exception as e:
                      print(f"Retry {attempt+1} for batch {id_str}: {e}")
                      time.sleep(5)
              else:
                  print(f"Failed batch {id_str}, skipping")
                  continue

              root = ET.fromstring(xml_data)
              for item in root.findall('item'):
                  gid = item.get('id')
                  categories = [l.get('value') for l in item.findall('link[@type="boardgamecategory"]')]
                  mechanics = [l.get('value') for l in item.findall('link[@type="boardgamemechanic"]')]
                  families = [l.get('value') for l in item.findall('link[@type="boardgamefamily"]')]
                  details[gid] = {
                      'categories': categories,
                      'mechanics': mechanics,
                      'families': families,
                  }
              time.sleep(2)  # Be polite to BGG servers

          for game in games:
              d = details.get(game['id'], {})
              game['categories'] = d.get('categories', [])
              game['mechanics'] = d.get('mechanics', [])
              game['families'] = d.get('families', [])

          data['games'] = games
          with open('collection.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(f"Details added for {len(details)} games")
          EOF

      - name: Commit collection.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add collection.json
          git diff --staged --quiet || git commit -m "chore: update BGG collection [$(date -u '+%Y-%m-%d')]"
          git push
